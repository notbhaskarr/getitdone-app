name: Keep Render Backend Awake

on:
  schedule:
    # GitHub Actions uses UTC timezone.
    # 3-18 UTC corresponds roughly to 8:30 AM to 11:30 PM IST.
    # This runs every 14 minutes during the day, and stays completely inactive at night (12AM - 8AM IST) to save free tier hours.
    - cron: '*/14 3-18 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://getitdone-app.onrender.com/ || echo "Ping failed"
